<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SicKloT | Forgot Password</title>
    <meta name="description" content="Reset your SicKloT account password.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:       #050507;
            --surface:  #0a0b10;
            --card:     rgba(14,16,26,0.85);
            --blue:     #0055ff;
            --glow:     #00d2ff;
            --border:   rgba(255,255,255,0.08);
            --muted:    #8b949e;
            --text:     #cbd5e1;
            --white:    #ffffff;
            --tr:       all 0.3s cubic-bezier(0.25,0.8,0.25,1);
        }
        html { height: 100%; }
        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,85,255,0.1) 0%, transparent 65%);
            top: -200px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            animation: pulse 6s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 44px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
        .auth-card::before {
            content: '';
            position: absolute; top:0;left:0;right:0;height:3px;
            background: linear-gradient(90deg, var(--blue), var(--glow));
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            color: var(--white); margin-bottom: 32px;
            text-decoration: none;
        }
        .logo i { color: var(--glow); font-size: 1.3rem; }

        .auth-title { font-family:'Outfit',sans-serif; font-size:1.8rem; font-weight:800; color:var(--white); margin-bottom:8px; }
        .auth-sub   { color: var(--muted); font-size:0.92rem; margin-bottom:32px; line-height: 1.5;}

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size:0.83rem; font-weight:600;
            color: var(--text); margin-bottom: 8px; letter-spacing:0.3px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 0.95rem; pointer-events:none;
        }
        .input-wrap input {
            width: 100%; padding: 13px 16px 13px 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem; outline: none;
            transition: var(--tr);
        }
        .input-wrap input::placeholder { color: var(--muted); }
        .input-wrap input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,85,255,0.15);
            background: rgba(0,85,255,0.04);
        }
        .toggle-pass {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); cursor: pointer; font-size: 0.9rem;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: var(--glow); }

        .error-msg {
            background: rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25);
            color: #f87171; border-radius:8px; padding:10px 14px;
            font-size:0.88rem; margin-bottom:18px; display:none;
        }
        .error-msg.show { display:flex; align-items:center; gap:8px; }
        
        .success-msg {
            background: rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.25);
            color: #34d399; border-radius:8px; padding:10px 14px;
            font-size:0.88rem; margin-bottom:18px; display:none;
        }
        .success-msg.show { display:flex; align-items:center; gap:8px; }

        .btn-submit {
            width:100%; padding:14px;
            border-radius:10px; border:none;
            background: linear-gradient(135deg, var(--glow), var(--blue));
            color: #000; font-family:'Inter',sans-serif;
            font-size:1rem; font-weight:700; cursor:pointer;
            transition: var(--tr);
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-submit:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(0,85,255,0.45); filter:brightness(1.08); }
        .btn-submit:disabled { opacity:0.6; pointer-events:none; }

        .auth-footer { text-align:center; margin-top:28px; font-size:0.88rem; color:var(--muted); }
        .auth-footer a { color:var(--glow); text-decoration:none; font-weight:600; transition:color 0.2s; }
        .auth-footer a:hover { color:var(--white); }

        /* Step Control */
        #step2 { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-cube"></i> SicKloT
        </a>

        <div id="step1">
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-sub">Enter your email address to receive a 6-digit verification code.</p>

            <div class="error-msg" id="errorMsg1">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText1"></span>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn1">
                    <i class="fa-solid fa-paper-plane"></i> Send Verification Code
                </button>
            </form>
        </div>

        <div id="step2">
            <h1 class="auth-title">Verify Code</h1>
            <p class="auth-sub">We sent a 6-digit code to your email. Enter it below along with your new password.</p>

            <div class="error-msg" id="errorMsg2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText2"></span>
            </div>
            <div class="success-msg" id="successMsg2">
                <i class="fa-solid fa-check-circle"></i>
                <span id="successText2"></span>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="code">Verification Code</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-key"></i>
                        <input type="text" id="code" placeholder="123456" required maxlength="6" pattern="\d{6}">
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Min. 8 characters" required minlength="8">
                        <span class="toggle-pass" id="togglePass1"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required minlength="8">
                        <span class="toggle-pass" id="togglePass2"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn2">
                    <i class="fa-solid fa-shield-check"></i> Reset Password
                </button>
            </form>
        </div>

        <div class="auth-footer">
            Remembered your password? <a href="login.html">Sign in &rarr;</a>
        </div>
    </div>

    <script>
        // Password visibility toggles
        function makeToggle(btnId, inputId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const pw  = document.getElementById(inputId);
                const ico = document.querySelector(`#${btnId} i`);
                const isHidden = pw.type === 'password';
                pw.type       = isHidden ? 'text' : 'password';
                ico.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            });
        }
        makeToggle('togglePass1', 'newPassword');
        makeToggle('togglePass2', 'confirmPassword');

        // Step 1: Send Forgot Password Request
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn  = document.getElementById('submitBtn1');
            const errD = document.getElementById('errorMsg1');
            const errT = document.getElementById('errorText1');
            const email = document.getElementById('email').value.trim();

            btn.innerHTML  = '<i class="fa-solid fa-spinner fa-spin"></i> Sending email…';
            btn.disabled   = true;
            errD.classList.remove('show');

            try {
                const res  = await fetch('http://localhost:3000/api/forgot-password', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email }),
                });
                const data = await res.json();

                if (data.success) {
                    // Transition to step 2
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Failed to request reset. Try again.');
                }
            } catch (err) {
                errT.textContent = err.message;
                errD.classList.add('show');
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Verification Code';
                btn.disabled  = false;
            }
        });

        // Step 2: Submit Output Code
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn   = document.getElementById('submitBtn2');
            const errD  = document.getElementById('errorMsg2');
            const errT  = document.getElementById('errorText2');
            const succD = document.getElementById('successMsg2');
            const succT = document.getElementById('successText2');

            errD.classList.remove('show');
            succD.classList.remove('show');

            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const code            = document.getElementById('code').value.trim();
            const email           = document.getElementById('email').value.trim();

            if (newPassword !== confirmPassword) {
                errT.textContent = 'Passwords do not match.';
                errD.classList.add('show');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting…';
            btn.disabled  = true;

            try {
                const res  = await fetch('http://localhost:3000/api/reset-password', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, code, newPassword }),
                });
                const data = await res.json();

                if (data.success) {
                    btn.style.display = 'none'; // hide button
                    succT.textContent = 'Success! Redirecting to login...';
                    succD.classList.add('show');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    throw new Error(data.error || 'Invalid code or failed to reset.');
                }
            } catch (err) {
                errT.textContent = err.message;
                errD.classList.add('show');
                btn.innerHTML = '<i class="fa-solid fa-shield-check"></i> Reset Password';
                btn.disabled  = false;
            }
        });
    </script>
</body>
</html>
