<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SicKloT | Login</title>
    <meta name="description" content="Sign in to your SicKloT account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:       #050507;
            --surface:  #0a0b10;
            --card:     rgba(14,16,26,0.85);
            --blue:     #0055ff;
            --glow:     #00d2ff;
            --border:   rgba(255,255,255,0.08);
            --muted:    #8b949e;
            --text:     #cbd5e1;
            --white:    #ffffff;
            --tr:       all 0.3s cubic-bezier(0.25,0.8,0.25,1);
        }
        html { height: 100%; }
        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        /* Animated background glow */
        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,85,255,0.1) 0%, transparent 65%);
            top: -200px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            animation: pulse 6s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 44px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
        .auth-card::before {
            content: '';
            position: absolute; top:0;left:0;right:0;height:3px;
            background: linear-gradient(90deg, var(--blue), var(--glow));
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            color: var(--white); margin-bottom: 32px;
            text-decoration: none;
        }
        .logo i { color: var(--glow); font-size: 1.3rem; }

        .auth-title { font-family:'Outfit',sans-serif; font-size:1.8rem; font-weight:800; color:var(--white); margin-bottom:8px; }
        .auth-sub   { color: var(--muted); font-size:0.92rem; margin-bottom:32px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size:0.83rem; font-weight:600;
            color: var(--text); margin-bottom: 8px; letter-spacing:0.3px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 0.95rem; pointer-events:none;
        }
        .input-wrap input {
            width: 100%; padding: 13px 16px 13px 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem; outline: none;
            transition: var(--tr);
        }
        .input-wrap input::placeholder { color: var(--muted); }
        .input-wrap input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,85,255,0.15);
            background: rgba(0,85,255,0.04);
        }
        .toggle-pass {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); cursor: pointer; font-size: 0.9rem;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: var(--glow); }

        .forgot { display:block; text-align:right; font-size:0.82rem; color:var(--muted); margin-top:6px; text-decoration:none; transition:color 0.2s; }
        .forgot:hover { color: var(--glow); }

        .error-msg {
            background: rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25);
            color: #f87171; border-radius:8px; padding:10px 14px;
            font-size:0.88rem; margin-bottom:18px; display:none;
        }
        .error-msg.show { display:flex; align-items:center; gap:8px; }

        .btn-submit {
            width:100%; padding:14px;
            border-radius:10px; border:none;
            background: linear-gradient(135deg, var(--glow), var(--blue));
            color: #000; font-family:'Inter',sans-serif;
            font-size:1rem; font-weight:700; cursor:pointer;
            transition: var(--tr);
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-submit:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(0,85,255,0.45); filter:brightness(1.08); }
        .btn-submit:disabled { opacity:0.6; pointer-events:none; }

        .divider {
            display:flex; align-items:center; gap:14px;
            margin:24px 0; color:var(--muted); font-size:0.82rem;
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px; background:var(--border);
        }

        .btn-discord {
            width:100%; padding:13px;
            border-radius:10px;
            border: 1px solid rgba(88,101,242,0.4);
            background: rgba(88,101,242,0.08);
            color: #aab4ff; font-family:'Inter',sans-serif;
            font-size:0.95rem; font-weight:600; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:10px;
            transition: var(--tr); text-decoration:none;
        }
        .btn-discord:hover { background:rgba(88,101,242,0.18); border-color:rgba(88,101,242,0.7); }

        .auth-footer { text-align:center; margin-top:28px; font-size:0.88rem; color:var(--muted); }
        .auth-footer a { color:var(--glow); text-decoration:none; font-weight:600; transition:color 0.2s; }
        .auth-footer a:hover { color:var(--white); }

        .admin-link {
            display:flex; align-items:center; justify-content:center; gap:8px;
            margin-top:16px; padding:10px;
            border-radius:8px; border:1px solid var(--border);
            color:var(--muted); font-size:0.83rem; text-decoration:none;
            transition:var(--tr);
        }
        .admin-link:hover { border-color:var(--blue); color:var(--glow); }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-cube"></i> SicKloT
        </a>

        <h1 class="auth-title">Welcome back 👋</h1>
        <p class="auth-sub">Log in to access your SicKloT account</p>

        <div class="error-msg" id="errorMsg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="toggle-pass" id="togglePass"><i class="fa-solid fa-eye"></i></span>
                </div>
                <a href="forgot-password.html" class="forgot">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="divider">or continue with</div>

        <a href="https://discord.gg/YWmDpp5q3M" target="_blank" class="btn-discord">
            <i class="fa-brands fa-discord"></i> Join with Discord
        </a>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create one &rarr;</a>
        </div>

        <a href="admin.html" class="admin-link">
            <i class="fa-solid fa-shield-halved"></i> Admin Panel
        </a>
    </div>

    <script src="api-config.js"></script>
    <script>
        // Password visibility toggle
        document.getElementById('togglePass').addEventListener('click', () => {
            const pw  = document.getElementById('password');
            const ico = document.querySelector('#togglePass i');
            const isHidden = pw.type === 'password';
            pw.type       = isHidden ? 'text' : 'password';
            ico.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });

        // Form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn  = document.getElementById('submitBtn');
            const errD = document.getElementById('errorMsg');
            const errT = document.getElementById('errorText');

            btn.innerHTML  = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in…';
            btn.disabled   = true;
            errD.classList.remove('show');

            try {
                const res  = await fetch(window.getApiUrl('/api/login'), {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        email:    document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                
                let data;
                try {
                    data = await res.json();
                } catch(e) {
                    throw new Error('Backend server is offline or not configured.');
                }

                if (data.success) {
                    localStorage.setItem('siklot_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                errT.textContent = err.message === 'Failed to fetch' ? 'Cannot connect to server.' : err.message;
                errD.classList.add('show');
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
                btn.disabled  = false;
            }
        });
    </script>
</body>
</html>
